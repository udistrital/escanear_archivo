kind: pipeline
name: oati_golang_api_ci

workspace:
  base: /go
  path: src/github.com/${DRONE_REPO}

steps:
- name: go_build
  image: golang:1.24
  commands:
  - go get -t
  - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o main
  when:
    branch:
    - develop
    - feature/*
    event:
    - push

- name: run_sonar_scanner
  image: sonarsource/sonar-scanner-cli:latest
  environment:
    SONAR_HOST_URL:
      from_secret: SONAR_HOST
    SONAR_TOKEN:
      from_secret: SONAR_TOKEN
    SONAR_SCANNER_OPTS: "-Dsonar.working.directory=/tmp/.scannerwork"
  commands:
    - sonar-scanner
  when:
    branch:
    - develop
    - feature/*
    - release/*
    event:
    - push

- name: publish_to_ecr_release
  image: plugins/ecr
  settings:
    access_key:
      from_secret: AWS_ACCESS_KEY_ID
    create_repository: true
    secret_key:
      from_secret: AWS_SECRET_ACCESS_KEY
    region:
      from_secret: AWS_REGION
    repo: ${DRONE_REPO_NAME}
    tags:
      - ${DRONE_COMMIT:0:7}
      - release
  when:
    branch:
      - release/*
    event:
      - push

- name: publish_to_ecr_prod
  image: plugins/ecr
  settings:
    access_key:
      from_secret: AWS_ACCESS_KEY_ID
    secret_key:
      from_secret: AWS_SECRET_ACCESS_KEY
    region:
      from_secret: AWS_REGION
    repo: ${DRONE_REPO_NAME}
    tags:
      - ${DRONE_COMMIT:0:7}
      - latest
  when:
    branch:
      - master
    event:
      - push

- name: update_ecs_service
  image: amazon/aws-cli:latest
  environment:
    AWS_ACCESS_KEY_ID:
      from_secret: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY:
      from_secret: AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION:
      from_secret: AWS_REGION
  commands:
    - aws ecs update-service
      --cluster aplicaciones
      --service $${DRONE_REPO_NAME}
      --force-new-deployment
      --query "service.deployments[0].id"
  when:
    branch:
      - release/*
      - master
    event:
      - push