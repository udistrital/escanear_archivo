- name: deploy_ecs_service_release
  image: joshdvir/drone-ecs-deploy
  settings:
    cluster: aplicaciones
    aws_access_key_id: ${AWS_ACCESS_KEY_ID}
    aws_secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    image_name: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${DRONE_REPO_NAME}:release"
    region: ${AWS_REGION}
    service: ${DRONE_REPO_NAME}
  environment:
    AWS_ACCESS_KEY_ID:
      from_secret: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY:
      from_secret: AWS_SECRET_ACCESS_KEY
    AWS_REGION:
      from_secret: AWS_REGION
    AWS_ACCOUNT_ID:
      from_secret: aws_account_id
